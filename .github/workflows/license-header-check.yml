name: License header check

on:
  push:
    branches: [main, developer-branch]
  pull_request:
    branches: [main, developer-branch]

jobs:
  check-headers:
    name: Verify Apache 2.0 headers on all .py files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run license header checker
        run: python scripts/check_license_headers.py
